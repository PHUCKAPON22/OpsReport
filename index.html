<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderSiam Automation ROI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">WanderSiam Automation ROI</h1>
            <p class="text-slate-500">คำนวณมูลค่าความประหยัดจากระบบ AI & Automation</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="card p-4">
                <label class="block text-sm font-medium text-slate-600">เงินเดือนเฉลี่ย (บาท)</label>
                <input type="number" id="salary" value="23000" class="w-full mt-1 border-slate-200 rounded-md p-2 bg-slate-50" oninput="calculateAll()">
            </div>
            <div class="card p-4">
                <label class="block text-sm font-medium text-slate-600">วันทำงาน/เดือน</label>
                <input type="number" id="workDays" value="26" class="w-full mt-1 border-slate-200 rounded-md p-2 bg-slate-50" oninput="calculateAll()">
            </div>
            <div class="card p-4">
                <label class="block text-sm font-medium text-slate-600">ชั่วโมงทำงาน/วัน</label>
                <input type="number" id="workHours" value="8" class="w-full mt-1 border-slate-200 rounded-md p-2 bg-slate-50" oninput="calculateAll()">
            </div>
            <div class="card p-4 bg-indigo-600 text-white">
                <label class="block text-sm font-medium opacity-80">ยอดจองทั้งหมด (เคส)</label>
                <input type="number" id="totalBookings" value="5739" class="w-full mt-1 bg-indigo-500 border-none rounded-md p-2 text-white placeholder-indigo-300" oninput="calculateAll()">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
            <div class="card p-6 border-t-4 border-green-500">
                <p class="text-slate-500 text-sm uppercase font-bold">ประหยัดเงินได้รวม</p>
                <h2 id="totalMoneySaved" class="text-4xl font-black text-green-600 mt-2">฿0</h2>
            </div>
            <div class="card p-6 border-t-4 border-blue-500">
                <p class="text-slate-500 text-sm uppercase font-bold">ประหยัดเวลาได้รวม</p>
                <h2 id="totalHoursSaved" class="text-4xl font-black text-blue-600 mt-2">0 ชม.</h2>
            </div>
            <div class="card p-6 border-t-4 border-orange-500">
                <p class="text-slate-500 text-sm uppercase font-bold text-center">ทำงานแทนคนได้</p>
                <h2 id="totalFTE" class="text-4xl font-black text-orange-600 mt-2 text-center">0.0 คน</h2>
            </div>
        </div>

        <div class="card overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="p-4">รายการงาน</th>
                        <th class="p-4 text-center">เวลาฐาน (นาที)</th>
                        <th class="p-4 text-center">AI ช่วย (%)</th>
                        <th class="p-4 text-right">ประหยัดได้ (นาที)</th>
                    </tr>
                </thead>
                <tbody id="taskBody" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const tasks = [
            { name: "เช็คเมล & คัดกรอง", baseTime: 2, aiPercent: 95 },
            { name: "ลง Booking เข้าระบบ", baseTime: 5, aiPercent: 90 },
            { name: "นัดเวลารับ-ส่ง (ทัวร์)", baseTime: 7, aiPercent: 10 },
            { name: "รวบรวมข้อมูลลง Sheet", baseTime: 3, aiPercent: 100 }
        ];

        function calculateAll() {
            const salary = parseFloat(document.getElementById('salary').value) || 0;
            const workDays = parseFloat(document.getElementById('workDays').value) || 1;
            const workHours = parseFloat(document.getElementById('workHours').value) || 1;
            const totalBookings = parseFloat(document.getElementById('totalBookings').value) || 0;
            
            const hourlyRate = salary / (workDays * workHours);
            let totalMinsSaved = 0;

            const tbody = document.getElementById('taskBody');
            tbody.innerHTML = '';

            tasks.forEach((task, index) => {
                const savedMins = (totalBookings * task.baseTime) * (task.aiPercent / 100);
                totalMinsSaved += savedMins;

                tbody.innerHTML += `
                    <tr>
                        <td class="p-4 font-medium">${task.name}</td>
                        <td class="p-4 text-center">${task.baseTime}</td>
                        <td class="p-4 text-center">
                            <input type="number" value="${task.aiPercent}" 
                                class="w-16 border rounded p-1 text-center" 
                                oninput="tasks[${index}].aiPercent = this.value; calculateAll()"> %
                        </td>
                        <td class="p-4 text-right text-green-600 font-bold">${Math.round(savedMins).toLocaleString()}</td>
                    </tr>
                `;
            });

            const totalHours = totalMinsSaved / 60;
            const moneySaved = totalHours * hourlyRate;
            const fte = totalHours / (workDays * workHours);

            document.getElementById('totalMoneySaved').innerText = '฿' + Math.round(moneySaved).toLocaleString();
            document.getElementById('totalHoursSaved').innerText = Math.round(totalHours).toLocaleString() + ' ชม.';
            document.getElementById('totalFTE').innerText = fte.toFixed(2) + ' คน';
        }

        window.onload = calculateAll;
    </script>
</body>
</html>
